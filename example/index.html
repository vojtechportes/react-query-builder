    <style id="seo-fallback-styles">
      [data-seo-fallback] {
        box-sizing: border-box;
        min-height: 100vh;
        padding: clamp(2rem, 6vw, 5rem) clamp(1rem, 4vw, 3rem);
        font-family: 'Segoe UI', 'Inter', sans-serif;
        color: #0f172a;
        background:
          radial-gradient(circle at top left, #e8eeff 0, transparent 36rem),
          linear-gradient(180deg, #f8fbff 0%, #eef3fb 100%);
      }

      [data-seo-fallback] article {
        max-width: 64rem;
        margin: 0 auto;
        padding: clamp(1.5rem, 4vw, 3rem);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 1.5rem 4rem rgba(15, 23, 42, 0.08);
      }

      [data-seo-fallback] article::before {
        display: block;
        width: 3.5rem;
        height: 0.3rem;
        margin-bottom: 1.5rem;
        border-radius: 999px;
        background: linear-gradient(90deg, #3f51b5, #93a4ff, #3f51b5);
        background-size: 200% 100%;
        animation: seo-fallback-loading 1.2s ease-in-out infinite;
        content: '';
      }

      [data-seo-fallback] h1 {
        margin: 0.35rem 0 1rem;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1.08;
      }

      [data-seo-fallback] h2 {
        margin-top: 2rem;
      }

      [data-seo-fallback] p,
      [data-seo-fallback] li {
        line-height: 1.7;
      }

      [data-seo-fallback] nav ul {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1.25rem;
        padding: 0;
        list-style: none;
      }

      [data-seo-fallback] a {
        color: #3346a8;
        font-weight: 600;
      }

      @keyframes seo-fallback-loading {
        from {
          background-position: 100% 0;
        }
        to {
          background-position: -100% 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        [data-seo-fallback] article::before {
          animation: none;
        }
      }
    </style>
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
